<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Solar Bench - Berat</title>
<meta http-equiv="refresh" content="15">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gaugeJS/dist/gauge.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#f3f5f7;
    text-align:center;
}
h1{
    margin-top:20px;
    color:#0b7a75;
}
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}
.card{
    background:white;
    width:250px;
    margin:15px;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
canvas{
    margin-top:10px;
}
.chart-container{
    width:80%;
    margin:40px auto;
}
</style>
</head>

<body>

<h1>Smart Solar Bench - Live Dashboards</h1>
<h2 id="globalStatus"></h2>

<div class="container">

<div class="card">
<h3>Temperatura (°C)</h3>
<canvas id="tempGauge" width="200" height="200"></canvas>
<p id="tempValue"></p>
<p id="tempStatus"></p>
</div>

<div class="card">
<h3>Lagështia (%)</h3>
<canvas id="humGauge" width="200" height="200"></canvas>
<p id="humValue"></p>
<p id="humStatus"></p>
</div>

<div class="card">
<h3>Presioni Atmosferik (hPa)</h3>
<canvas id="presGauge" width="200" height="200"></canvas>
<p id="presValue"></p>
<p id="presStatus"></p>
</div>

<div class="card">
<h3>Cilësia e Ajrit (kΩ)</h3>
<canvas id="gasGauge" width="200" height="200"></canvas>
<p id="gasValue"></p>
<p id="gasStatus"></p>
</div>

<div class="card">
<h3>Niveli i Zhurmës (dB)</h3>
<canvas id="soundGauge" width="200" height="200"></canvas>
<p id="soundValue"></p>
<p id="soundStatus"></p>
</div>

</div>

<div class="chart-container">
<canvas id="tempChart"></canvas>
</div>

<div class="chart-container">
<canvas id="soundChart"></canvas>
</div>

<script>

async function loadData(){

const response = await fetch("https://api.thingspeak.com/channels/3255086/feeds.json?minutes=200");
const data = await response.json();

const feeds = data.feeds;
const latest = feeds[feeds.length-1];

let t = parseFloat(latest.field1);
let h = parseFloat(latest.field2);
let p = parseFloat(latest.field3);
let g = parseFloat(latest.field4);
let db = parseFloat(latest.field5);

document.getElementById("tempValue").innerHTML = t + " °C";
document.getElementById("humValue").innerHTML = h + " %";
document.getElementById("presValue").innerHTML = p + " hPa";
document.getElementById("gasValue").innerHTML = g + " kΩ";
document.getElementById("soundValue").innerHTML = db.toFixed(1) + " dB";

// TEMPERATURE INTERPRETATION
if(t < 5){
    document.getElementById("tempStatus").innerHTML = "Very cold conditions";
}
else if(t < 15){
    document.getElementById("tempStatus").innerHTML = "Cold outdoor weather";
}
else if(t < 28){
    document.getElementById("tempStatus").innerHTML = "Comfortable temperature";
}
else if(t < 35){
    document.getElementById("tempStatus").innerHTML = "Warm conditions";
}
else{
    document.getElementById("tempStatus").innerHTML = "Heat stress risk";
}

// HUMIDITY INTERPRETATION
if(h < 30){
    document.getElementById("humStatus").innerHTML = "Air is too dry";
}
else if(h <= 60){
    document.getElementById("humStatus").innerHTML = "Ideal humidity level";
}
else if(h <= 75){
    document.getElementById("humStatus").innerHTML = "Humid conditions";
}
else{
    document.getElementById("humStatus").innerHTML = "Very humid - possible discomfort";
}

// PRESSURE INTERPRETATION
if(p > 1015){
    document.getElementById("presStatus").innerHTML = "Stable weather expected";
}
else if(p >= 1005){
    document.getElementById("presStatus").innerHTML = "Normal atmospheric pressure";
}
else if(p >= 990){
    document.getElementById("presStatus").innerHTML = "Unstable weather - possible rain";
}
else{
    document.getElementById("presStatus").innerHTML = "Storm system likely";
}

// GAS / AIR QUALITY INTERPRETATION
if(g > 100){
    document.getElementById("gasStatus").innerHTML = "Air quality is excellent";
}
else if(g > 60){
    document.getElementById("gasStatus").innerHTML = "Air quality is good";
}
else if(g > 40){
    document.getElementById("gasStatus").innerHTML = "Air quality is moderate";
}
else{
    document.getElementById("gasStatus").innerHTML = "Air pollution detected";
}

// SOUND INTERPRETATION
if(db < 40){
    document.getElementById("soundStatus").innerHTML = "Very quiet environment";
}
else if(db < 55){
    document.getElementById("soundStatus").innerHTML = "Normal ambient noise";
}
else if(db < 70){
    document.getElementById("soundStatus").innerHTML = "Moderate noise level";
}
else if(db < 85){
    document.getElementById("soundStatus").innerHTML = "Loud - prolonged exposure not ideal";
}
else{
    document.getElementById("soundStatus").innerHTML = "Harmful noise level!";
}

// GLOBAL STATUS
if(g > 100 && h <= 60 && t < 30){
    document.getElementById("globalStatus").innerHTML = "Environmental conditions are optimal";
}
else if(g < 40){
    document.getElementById("globalStatus").innerHTML = "Air quality warning in the park";
}
else{
    document.getElementById("globalStatus").innerHTML = "Environmental conditions are acceptable";
}

createGauge("tempGauge", 0, 50, t);
createGauge("humGauge", 0, 100, h);
createGauge("presGauge", 950, 1050, p);
createGauge("gasGauge", 0, 200, g);
createGauge("soundGauge", 30, 100, db);

createTempChart(feeds);
createSoundChart(feeds);

}

function createGauge(id, min, max, value){
var opts = {
  angle: 0,
  lineWidth: 0.3,
  radiusScale: 1,
  pointer:{
    length: 0.6,
    strokeWidth: 0.035
  },
  limitMax: false,
  limitMin: false,
  highDpiSupport: true
};

var target = document.getElementById(id);
var gauge = new Gauge(target).setOptions(opts);
gauge.maxValue = max;
gauge.setMinValue(min);
gauge.animationSpeed = 32;
gauge.set(value);
}

function createTempChart(feeds){
let labels = feeds.map(f =>
    new Date(f.created_at).toLocaleTimeString()
);
let temps = feeds.map(f => {
    let value = parseFloat(f.field1);
    return Math.round(value * 2) / 2;
});
new Chart(document.getElementById("tempChart"),{
    type: "line",
    data:{
        labels: labels,
        datasets:[{
            label: "Temperature Trend (°C)",
            data: temps,
            fill: false,
            borderColor: "#e74c3c",
            tension: 0.3
        }]
    },
    options:{
        scales:{
            y:{
                ticks:{ stepSize: 0.5 }
            }
        }
    }
});
}

function createSoundChart(feeds){
let labels = feeds.map(f =>
    new Date(f.created_at).toLocaleTimeString()
);
let sounds = feeds.map(f => {
    let value = parseFloat(f.field5);
    return isNaN(value) ? null : parseFloat(value.toFixed(1));
});
new Chart(document.getElementById("soundChart"),{
    type: "line",
    data:{
        labels: labels,
        datasets:[{
            label: "Noise Level Trend (dB)",
            data: sounds,
            fill: false,
            borderColor: "#8e44ad",
            tension: 0.3
        }]
    },
    options:{
        scales:{
            y:{
                min: 30,
                max: 100,
                ticks:{ stepSize: 5 }
            }
        }
    }
});
}

loadData();

</script>

</body>
</html>
